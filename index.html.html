<style>

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9fafb; color: #111827; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  .filter-btn.active { background: #1D4ED8; color: #fff; border-color: #1D4ED8; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; }
  .card { background: #fff; border: 0.5px solid #e5e7eb; border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: #93C5FD; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .card-addr { font-size: 12px; color: #9ca3af; }
  .card-icon { font-size: 28px; }
  .area-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .area-tag { font-size: 11px; background: #F3F4F6; color: #374151; border: 1px solid #E5E7EB; border-radius: 4px; padding: 2px 7px; }
  .price-row { display: flex; flex-direction: column; gap: 3px; }
  .price-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .price-type { font-size: 11px; font-weight: 600; min-width: 24px; }
  .card-bottom { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid #f3f4f6; display: flex; gap: 8px; align-items: center; }
  .deal-cnt { font-size: 11px; }
  .more-btn { margin-left: auto; font-size: 11px; color: #3B82F6; font-weight: 500; }
  .stat-box { margin-top: 1.5rem; padding: 1rem; background: #f3f4f6; border-radius: 10px; display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-item p:first-child { font-size: 10px; color: #9ca3af; margin-bottom: 2px; }
  .stat-item p:last-child { font-size: 13px; font-weight: 500; color: #374151; }
  .empty { text-align: center; padding: 3rem; color: #9ca3af; font-size: 14px; }

  .detail-card { background: #fff; border: 0.5px solid #e5e7eb; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .gallery { height: 160px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; font-size: 13px; color: #374151; font-weight: 500; }

const DEAL_COLORS = { "매매":"#1D4ED8", "전세":"#15803D", "월세":"#C2410C" };
const DEAL_BG = { "매매":"#EFF6FF", "전세":"#F0FDF4", "월세":"#FFF7ED" };
const DEAL_BORDER = { "매매":"#BFDBFE", "전세":"#BBF7D0", "월세":"#FED7AA" };
const GALLERY_COLORS = ["#DBEAFE","#D1FAE5","#FEF3C7","#FCE7F3","#E0E7FF"];

let currentFilter = "전체";
let currentDetailPhotos = [];
let currentPhotoIdx = 0;

function parsePrice(deal) {
  if (deal.type === "월세") {
    const m = deal.price.match(/월(\d+)/);
    return m ? parseInt(m[1]) : null;
  }
  const m = deal.price.match(/([\d,]+)만/);
  return m ? parseInt(m[1].replace(/,/g,"")) : null;
}

function fmtWon(val, type) {
  if (type === "월세") return val + "만원";
  const uk = Math.floor(val / 10000);
  const chun = Math.round((val % 10000) / 1000);
  return chun === 0 ? `${uk}억` : `${uk}억 ${chun}천만원`;
}

function getPriceRange(deals) {
  const types = ["매매","전세","월세"];
  return types.map(t => {
    const filtered = deals.filter(d => d.type === t);
    if (!filtered.length) return null;
    const amounts = filtered.map(d => parsePrice(d)).filter(Boolean);
    if (!amounts.length) return null;
    const min = Math.min(...amounts), max = Math.max(...amounts);
    const label = min === max ? fmtWon(min, t) : `${fmtWon(min, t)} ~ ${fmtWon(max, t)}`;
    return { type: t, label };
  }).filter(Boolean);
}

function getAreas(deals) {
  return [...new Set(deals.map(d => d.size))].sort();
}

function renderFilters() {
  const row = document.getElementById("filter-row");
  const filters = ["전체","매매","전세","월세"];
  const counts = { 매매: LISTINGS.filter(l=>l.tag==="매매").length, 전세: LISTINGS.filter(l=>l.tag==="전세").length, 월세: LISTINGS.filter(l=>l.tag==="월세").length };
  row.innerHTML = filters.map(f => {
    const cnt = f === "전체" ? LISTINGS.length : counts[f];
    return `<button class="filter-btn ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">${f} (${cnt})</button>`;
  }).join("");
}

function setFilter(f) {
  currentFilter = f;
  renderFilters();
  renderList();
}

function renderList() {
  const q = document.getElementById("search-input").value.trim();
  const filtered = LISTINGS.filter(l =>
    (currentFilter === "전체" || l.tag === currentFilter) &&
    (!q || l.name.includes(q) || l.address.includes(q))
  );
  const grid = document.getElementById("card-grid");
  const empty = document.getElementById("empty");
  if (!filtered.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  grid.innerHTML = filtered.map(l => {
    const areas = getAreas(l.deals);
    const prices = getPriceRange(l.deals);
    const dealCnts = ["매매","전세","월세"].map(t => {
      const cnt = l.deals.filter(d=>d.type===t).length;
      return cnt ? `<span class="deal-cnt" style="color:${DEAL_COLORS[t]}">${t} ${cnt}건</span>` : "";
    }).join("");
    return `
    <div class="card" onclick="showDetail(${l.id})">
      <div class="card-top">
        <div>
          <div class="card-name">${l.name}</div>
          <div class="card-addr">📍 ${l.address}</div>
        </div>
        <span class="card-icon">${l.img}</span>
      </div>
      <div class="area-tags">
        ${areas.map(a=>`<span class="area-tag">${a}</span>`).join("")}
      </div>
      <div class="price-row">
        ${prices.map(p=>`
          <div class="price-item">
            <span class="price-type" style="color:${DEAL_COLORS[p.type]}">${p.type}</span>
            <span style="color:#374151">${p.label}</span>
          </div>`).join("")}
      </div>
      <div class="card-bottom">
        ${dealCnts}
        <span class="more-btn">상세보기 →</span>
      </div>
    </div>`;
  }).join("");
}

function showDetail(id) {
  const l = LISTINGS.find(x=>x.id===id);
  document.getElementById("list-page").style.display = "none";
  const dp = document.getElementById("detail-page");
  dp.style.display = "block";

  const ph = l.priceHistory;
  const vals = ph.map(d=>d.price);
  const rising = vals[vals.length-1] >= vals[0];
  const diff = vals[vals.length-1] - vals[0];
  const diffPct = ((diff/vals[0])*100).toFixed(1);
  const latest = vals[vals.length-1];

  currentDetailPhotos = l.photos;
  currentPhotoIdx = 0;

  dp.innerHTML = `
    <button class="back-btn" onclick="showList()">← 목록으로</button>
    <div class="detail-card">
      <div class="gallery" id="gallery" style="background:${GALLERY_COLORS[0]}">
        <span style="font-size:40px">${l.photos[0].split(" ")[0]}</span>
        <span>${l.photos[0].split(" ").slice(1).join(" ")}</span>
      </div>
      <div class="thumb-row" style="margin-bottom:1rem">
        ${l.photos.map((p,i)=>`<button class="thumb ${i===0?'active':''}" id="thumb-${i}" onclick="setPhoto(${i})">${p.split(" ")[0]}</button>`).join("")}
      </div>
      <div class="detail-info">
        <div class="detail-head">
          <div>
            <span style="font-size:11px;background:${DEAL_BG[l.tag]};color:${DEAL_COLORS[l.tag]};border:1px solid ${DEAL_BORDER[l.tag]};border-radius:4px;padding:2px 8px;font-weight:500">${l.tag}</span>
            <div class="detail-name">${l.name}</div>
            <div class="detail-addr">📍 ${l.address}</div>
          </div>
          <div>
            <div class="detail-price-label">${l.priceType}</div>
            <div class="detail-price-val">${l.price}만원</div>
          </div>
        </div>
        <p class="detail-desc">${l.desc}</p>
        <div class="meta-row">
          ${[["면적",l.area],["층",l.floor],["세대수",`${l.units}세대`],["준공",`${l.built}년`]].map(([k,v])=>`
            <div class="meta-item"><p>${k}</p><p>${v}</p></div>`).join("")}
        </div>
      </div>
    </div>

    <div class="chart-box">
      <div class="chart-head">
        <span class="chart-title">단지 시세 (매매 기준)</span>
        <span class="chart-diff" style="color:${rising?'#15803D':'#DC2626'}">${rising?'▲':'▼'} ${Math.abs(diff/10000).toFixed(1)}억 (${diffPct}%)</span>
      </div>
      ${renderChart(l.priceHistory)}
      <div class="chart-stats">
        ${[["최저",`${(Math.min(...vals)/10000).toFixed(1)}억`],["최고",`${(Math.max(...vals)/10000).toFixed(1)}억`],["최근",`${(latest/10000).toFixed(1)}억`]].map(([k,v])=>`
          <div class="chart-stat"><p>${k}</p><p>${v}</p></div>`).join("")}
      </div>
    </div>

    <div class="deals-box">
      <div class="deals-title">실제 매물</div>
      <div class="tab-row" id="deal-tabs">
        ${["전체","매매","전세","월세"].map(t=>`<button class="tab-btn ${t==='전체'?'active':''}" onclick="setDealTab('${t}',${l.id})">${t}</button>`).join("")}
      </div>
      <div class="deal-list" id="deal-list">
        ${renderDeals(l.deals, "전체")}
      </div>
    </div>`;
}

function setPhoto(i) {
  currentPhotoIdx = i;
  const l = LISTINGS.find(x => x.photos === currentDetailPhotos) ||
    LISTINGS.find(x => x.photos.every((p,j) => p === currentDetailPhotos[j]));
  const p = currentDetailPhotos[i];
  const gallery = document.getElementById("gallery");
  gallery.style.background = GALLERY_COLORS[i % GALLERY_COLORS.length];
  gallery.innerHTML = `<span style="font-size:40px">${p.split(" ")[0]}</span><span>${p.split(" ").slice(1).join(" ")}</span>`;
  document.querySelectorAll(".thumb").forEach((el,j) => {
    el.classList.toggle("active", j === i);
  });
}

function renderChart(data) {
  const vals = data.map(d=>d.price);
  const min = Math.min(...vals)-500, max = Math.max(...vals)+500, range = max-min;
  const W=520, H=140, pL=70, pR=20, pT=10, pB=32;
  const cW=W-pL-pR, cH=H-pT-pB;
  const pts = data.map((d,i)=>({
    x: pL+(i/(data.length-1))*cW,
    y: pT+cH-((d.price-min)/range)*cH, d
  }));
  const pathD = pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(" ");
  const areaD = pathD+` L${pts[pts.length-1].x},${pT+cH} L${pts[0].x},${pT+cH} Z`;
  const grids = [0,0.25,0.5,0.75,1].map(t=>({price:min+t*range, y:pT+cH-t*cH}));
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.01"/>
    </linearGradient></defs>
    ${grids.map(g=>`<line x1="${pL}" y1="${g.y}" x2="${W-pR}" y2="${g.y}" stroke="#e5e7eb" stroke-width="0.5"/>
      <text x="${pL-6}" y="${g.y+4}" text-anchor="end" font-size="10" fill="#9ca3af">${(g.price/10000).toFixed(1)}억</text>`).join("")}
    <path d="${areaD}" fill="url(#ag)"/>
    <path d="${pathD}" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#3B82F6"/>`).join("")}
    ${data.map((d,i)=>{
      const x=pL+(i/(data.length-1))*cW;
      return `<text x="${x}" y="${H-8}" text-anchor="middle" font-size="9" fill="#9ca3af">${d.month}</text>`;
    }).join("")}
  </svg>`;
}

function renderDeals(deals, tab) {
  const filtered = tab === "전체" ? deals : deals.filter(d=>d.type===tab);
  return filtered.map(d=>`
    <div class="deal-row">
      <div class="deal-left">
        <span class="deal-tag" style="background:${DEAL_BG[d.type]};color:${DEAL_COLORS[d.type]};border:1px solid ${DEAL_BORDER[d.type]}">${d.type}</span>
        <span class="deal-size">${d.size} · ${d.floor}</span>
      </div>
      <div>
        <div class="deal-price">${d.price}</div>
        <div class="deal-date">${d.date}</div>
      </div>
    </div>`).join("");
}

function setDealTab(tab, id) {
  const l = LISTINGS.find(x=>x.id===id);
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.textContent===tab));
  document.getElementById("deal-list").innerHTML = renderDeals(l.deals, tab);
}

function showList() {
  document.getElementById("detail-page").style.display = "none";
  document.getElementById("list-page").style.display = "block";
}

renderFilters();
renderList();
</script>
</body>
</html>
